apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-server-metrics
  namespace: llm
  labels:
    app.kubernetes.io/name: llama-server
    release: monitoring-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s