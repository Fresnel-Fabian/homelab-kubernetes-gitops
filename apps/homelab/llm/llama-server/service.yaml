apiVersion: v1
kind: Service
metadata:
  name: llama-server
  namespace: llm
  labels:
    app.kubernetes.io/name: llama-server
    app.kubernetes.io/component: inference
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: llama-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP