apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: llm
  labels:
    app.kubernetes.io/name: llama-server
    app.kubernetes.io/component: inference
spec:
  replicas: 1
  strategy:
    type: Recreate  # GPU workload — no rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-server
        app.kubernetes.io/component: inference
    spec:
      nodeSelector:
        gpu.type: amd-rx6600xt
      tolerations:
        - key: gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server-rocm
          args:
            - "--model"
            - "/models/qwen3-8b-q4_k_m.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--n-gpu-layers"
            - "99"              # Offload all layers to GPU
            - "--ctx-size"
            - "8192"            # Match your previous OLLAMA_CONTEXT_LENGTH
            - "--parallel"
            - "1"               # Single concurrent request (8GB VRAM constraint)
            - "--metrics"       # Enable Prometheus /metrics endpoint
            # - "--flash-attn"    # Flash attention for memory efficiency
            - "--jinja"         # Jinja templating for chat templates
            - "--no-webui"      # Headless — no need for the built-in UI
          env:
            # ROCm overrides for Navi 23 (RX 6600 XT → gfx1030)
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "10.3.0"
            - name: GPU_MAX_ALLOC_PERCENT
              value: "100"
            - name: GPU_MAX_HEAP_SIZE
              value: "100"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              amd.com/gpu: 1
            limits:
              cpu: 4000m
              memory: 6Gi
              amd.com/gpu: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30    # Allow up to 5 min for model load
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-server-models