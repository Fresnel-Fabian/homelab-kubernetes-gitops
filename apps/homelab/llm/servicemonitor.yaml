apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ollama
  namespace: llm
  labels:
    release: monitoring-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: llm-ollama
  namespaceSelector:
    matchNames:
      - llm
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s