apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-values
  namespace: flux-system
data:
  values.yaml: |
    ollama:
      gpu:
        enabled: true
        type: 'amd'
        number: 1
      models:
        pull:
          - qwen3:8b
    extraEnv:
      - name: HSA_OVERRIDE_GFX_VERSION
        value: "10.3.0"
      - name: GPU_MAX_ALLOC_PERCENT
        value: "100"
      - name: GPU_MAX_HEAP_SIZE
        value: "100"
      - name: HSA_ENABLE_SDMA
        value: "0"
      - name: GPU_MAX_HW_QUEUES
        value: "8"
      - name: OLLAMA_FLASH_ATTENTION
        value: "1"
     # - name: OLLAMA_KV_CACHE_TYPE
     #   value: "q8_0"
      - name: OLLAMA_MAX_LOADED_MODELS
        value: "1"
      - name: OLLAMA_NUM_PARALLEL
        value: "1"
      - name: OLLAMA_NUM_BATCH
        value: "1024"
      - name: OLLAMA_CONTEXT_LENGTH
        value: "20480"
      # Keep model loaded forever — eliminates 5.4s cold load
      - name: OLLAMA_KEEP_ALIVE
        value: "-1"
      # Increase GPU overhead reservation slightly for stability
     # - name: OLLAMA_GPU_OVERHEAD
     #   value: "536870912"
    nodeSelector:
      gpu.type: amd-rx6600xt
    tolerations:
      - key: gpu
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 2500m
        memory: 4Gi
      limits:
        cpu: 8000m
        memory: 8Gi
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClass: local-path
      accessModes:
        - ReadWriteOnce
    service:
      type: LoadBalancer
      port: 11434
