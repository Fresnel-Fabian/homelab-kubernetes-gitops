apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: llm
  chart:
    spec:
      chart: ollama
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: otwld
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: ollama-values
      valuesKey: values.yaml
