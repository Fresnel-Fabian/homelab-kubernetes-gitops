apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-values
  namespace: flux-system
data:
  values.yaml: |
    ollama:
      gpu:
        enabled: true
        type: 'amd'
        number: 1
      models:
        pull:
          - qwen3:8b
    extraEnv:
      - name: HSA_OVERRIDE_GFX_VERSION
        value: "10.3.0"
      - name: GPU_MAX_ALLOC_PERCENT
        value: "100"
      - name: GPU_MAX_HEAP_SIZE
        value: "100"
      - name: OLLAMA_MAX_LOADED_MODELS
        value: "1"
      - name: OLLAMA_NUM_PARALLEL
        value: "1"
      - name: OLLAMA_CONTEXT_LENGTH
        value: "8192"
      - name: OLLAMA_METRICS
        value: "true"
    nodeSelector:
      gpu.type: amd-rx6600xt
    tolerations:
      - key: gpu
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClass: local-path
      accessModes:
        - ReadWriteOnce
    service:
      type: LoadBalancer
      port: 11434
