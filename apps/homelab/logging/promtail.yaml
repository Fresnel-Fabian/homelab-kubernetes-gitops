apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: logging
spec:
  interval: 1h
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 24h
  values:
    config:
      clients:
        - url: http://loki-gateway/loki/api/v1/push
      snippets:
        pipeline_stages:
          - drop:
              drop_counter_reason: etcd-grpc-keepalive-noise
              expression: rejected connection on client endpoint.*"error":"EOF"
          - drop:
              drop_counter_reason: apiserver-etcd-grpc-keepalive-noise
              expression: addrConn\.createTransport failed to connect.*127\.0\.0\.1:2379
          - drop:
              drop_counter_reason: calico-apiserver-noise
              expression: klog-logger=tigera-apiserver
