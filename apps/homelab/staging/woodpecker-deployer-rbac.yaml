apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-deployer
  namespace: staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: woodpecker-deployer
  namespace: staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: woodpecker-deployer
  namespace: staging
subjects:
  - kind: ServiceAccount
    name: woodpecker-deployer
    namespace: staging
roleRef:
  kind: Role
  name: woodpecker-deployer
  apiGroup: rbac.authorization.k8s.io
