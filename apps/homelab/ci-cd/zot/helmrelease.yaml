apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ci-cd
  chart:
    spec:
      chart: zot
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: zot-values
      valuesKey: values.yaml
