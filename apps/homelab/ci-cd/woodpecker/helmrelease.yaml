apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ci-cd
  chart:
    spec:
      chart: woodpecker
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: woodpecker
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: woodpecker-values
      valuesKey: values.yaml
