apiVersion: v1
kind: ConfigMap
metadata:
  name: woodpecker-values
  namespace: flux-system
data:
  values.yaml: |
    # ----- SERVER -----
    server:
      enabled: true

      # -- Replicas: 1 is correct for SQLite (default DB).
      #    If you move to PostgreSQL later, you can scale to 2+.
      statefulSet:
        replicaCount: 1
        annotations: {}
        labels: {}

      env:
        # Core: public URL that GitHub webhooks and users hit
        WOODPECKER_HOST: "https://ci.fresnelfabian.com"

        # Forge: GitHub OAuth2
        WOODPECKER_GITHUB: "true"

        # Admins: comma-separated GitHub usernames
        # Only admins can add repos, manage global secrets, and see admin panel
        WOODPECKER_ADMIN: "legal-ai-2026"

        # Limit repo sync to your GitHub org/user (optional, reduces noise)
        # WOODPECKER_REPO_OWNERS: "your-github-org"

        # Prometheus metrics endpoint — integrates with your kube-prometheus-stack
        # Set a token to protect the /metrics endpoint
        # WOODPECKER_PROMETHEUS_AUTH_TOKEN:
        #   valueFrom:
        #     secretKeyRef:
        #       name: woodpecker-github-secrets
        #       key: WOODPECKER_PROMETHEUS_AUTH_TOKEN

        # Pipeline limits — sensible defaults for a homelab
        WOODPECKER_DEFAULT_CLONE_PLUGIN: "woodpeckerci/plugin-git:latest"

      # GitHub OAuth credentials — injected from SOPS-encrypted secret
      extraSecretNamesForEnvFrom:
        - woodpecker-github-secrets

      persistence:
        enabled: true
        size: 10Gi
        mountPath: '/var/lib/woodpecker'
        # Uses cluster default (local-path) since storageClass: '' means "use default"
        storageClass: local-path

      service:
        type: ClusterIP
        port: 80
        # gRPC port for agent communication — chart defaults to 9000
        # No need to override unless you change it

      # Resource limits — Woodpecker server is lightweight (~100MB idle)
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # Health checks — chart defaults are good, these are explicit for clarity
      probes:
        liveness:
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 10
        readiness:
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 10

    # ----- AGENT -----
    agent:
      enabled: true

      # 2 agents = 2 parallel pipelines (each agent runs WOODPECKER_MAX_WORKFLOWS)
      # For a homelab, 2 is plenty. Scale up if you hit queue backlogs.
      replicaCount: 2

      env:
        # gRPC connection to server — must match the actual service name
        # Helm release name "ci-cd-woodpecker" → service "ci-cd-woodpecker-server"
        WOODPECKER_SERVER: "ci-cd-woodpecker-server:9000"

        # Kubernetes backend — pipeline steps run as pods in ci-cd namespace
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_BACKEND_K8S_NAMESPACE: ci-cd

        # Volume size for pipeline workspaces (clone, build artifacts)
        WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 2G

        # Storage class for pipeline workspace PVCs
        WOODPECKER_BACKEND_K8S_STORAGE_CLASS: local-path

        # Max parallel workflows per agent (default: 1)
        # With 2 agents × 2 workflows = 4 concurrent pipelines
        WOODPECKER_MAX_WORKFLOWS: "2"

        # Retry connecting to server on startup (useful during rollouts)
        WOODPECKER_CONNECT_RETRY_COUNT: "5"

      persistence:
        enabled: true
        size: 1Gi
        mountPath: '/etc/woodpecker'
        storageClass: local-path

      # RBAC — required for K8s backend to create pipeline pods
      # The chart creates ServiceAccount + Role + RoleBinding automatically

      # Resource limits — agents are lightweight, the actual work runs in pipeline pods
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
