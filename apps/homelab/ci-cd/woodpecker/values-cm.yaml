apiVersion: v1
kind: ConfigMap
metadata:
  name: woodpecker-values
  namespace: flux-system
data:
  values.yaml: |
    server:
      enabled: true
      env:
        WOODPECKER_HOST: "https://ci.fresnelfabian.com"
        WOODPECKER_GITHUB: "true"
      extraSecretNamesForEnvFrom:
        - woodpecker-github-secrets
      persistence:
        storageClass: local-path
    agent:
      enabled: true
      replicaCount: 2
      env:
        WOODPECKER_SERVER: "woodpecker-server:9000"
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_BACKEND_K8S_NAMESPACE: ci-cd
      persistence:
        storageClass: local-path
