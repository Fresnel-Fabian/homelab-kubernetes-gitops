apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skills
  namespace: agentic-tools
data:
  SKILL.md: |
    # Model Manager Skill
    ## Philosophy: Local First / System 1 / System 2 Thinking
    Route tasks like a human brain — most things run on autopilot locally.
    Escalate to cloud only when local can't handle the depth. Default free, earn your way up.
    ```
    TIER 0 │ Local       │ dolphin      │ ollama/dolphin3:8b-llama3.1-q4_K_M    │ DEFAULT — free, local, always first
    TIER 0 │ Reflex      │ flash-lite   │ google/gemini-2.5-flash-lite          │ trivial / high-volume cloud fallback
    TIER 0 │ Reflex      │ nano         │ openai/gpt-5-nano                     │ trivial / high-volume cloud fallback
    TIER 1 │ System 1    │ flash        │ google/gemini-2.5-flash               │ workhorse when local fails
    TIER 1 │ System 1    │ haiku        │ anthropic/claude-haiku-4-5            │ budget Anthropic
    TIER 1 │ System 1    │ mini         │ openai/gpt-5-mini                     │ budget OpenAI
    TIER 2 │ System 2    │ flash-think  │ google/gemini-2.5-flash-thinking      │ reasoning / multi-step
    TIER 2 │ System 2    │ o3-mini      │ openai/o3-mini                        │ math / proofs
    TIER 3 │ Deep Work   │ sonnet       │ anthropic/claude-sonnet-4-6           │ quality writing / code
    TIER 3 │ Deep Work   │ gpt5         │ openai/gpt-5.2                        │ frontier reasoning
    TIER 3 │ Deep Work   │ gemini-pro   │ google/gemini-3.1-pro-preview         │ frontier multimodal / 1M ctx
    TIER 4 │ Frontier    │ opus         │ anthropic/claude-opus-4-6             │ max Anthropic quality
    TIER 4 │ Frontier    │ gpt5-pro     │ openai/gpt-5.2-pro                    │ max OpenAI quality
    ```
 
    ---

    ## About Dolphin3
    Dolphin3:8b-llama3.1-q4_K_M is an instruction-tuned Llama 3.1 8B fine-tune optimised
    for agentic tasks, tool use, and direct instruction following.
    - Context window: 8192 tokens (hard limit — escalate for long conversations)
    - Strengths: instruction following, coding, bash, kubectl, structured output
    - Quantization: q4_K_M — good balance of quality vs memory (~5GB VRAM)
    - No system prompt filtering — follows instructions directly

    ---

    ## Routing Rules

    ### TIER 0 — Local (dolphin) ← DEFAULT
    **Always try dolphin first. Free, in-cluster, zero API cost.**
    Best suited for:
    - Direct instruction tasks — bash, kubectl, file edits, config changes
    - Code generation, debugging, scripting
    - Structured output — JSON, YAML, CSV transformations
    - Short Q&A, summarisation, classification
    - Agentic tool-use loops where speed matters

    **Hard limits — escalate when:**
    - Conversation exceeds ~6k tokens (context window is 8192 — leave headroom)
    - Task requires real-time web knowledge (→ flash)
    - Wrong answer twice in a row (→ flash or haiku)
    - Task requires nuanced reasoning or long-context analysis (→ flash-think or sonnet)
    - User explicitly requests a cloud model

    ### TIER 0 — Reflex Cloud (flash-lite · nano)
    First cloud fallback when dolphin is unavailable or context is full:
    - Keyword extraction, entity recognition, yes/no classification
    - Reformatting structured data across many chunks
    - Any task you'd delegate to a regex if you could

    ### TIER 1 — System 1 (flash · haiku · mini)
    Cloud workhorse for tasks dolphin can't handle:
    - Tasks requiring knowledge after July 2025 (dolphin cutoff)
    - Web search grounding (flash has native Google Search)
    - Long-context tasks (flash handles 1M tokens)
    - General coding, explaining concepts, writing
    **Rotation:** flash → haiku → mini for load balancing.

    ### TIER 2 — System 2 (flash-think · o3-mini)
    Deliberate reasoning tasks:
    - Multi-step planning, dependency graphs
    - Debugging subtle logic errors across many files
    - System architecture design from scratch
    - When Tier 1 gives wrong/shallow answer twice
    - Use **o3-mini** for maths, proofs, algorithm correctness

    ### TIER 3 — Deep Work (sonnet · gpt5 · gemini-pro)
    Quality of thought is the bottleneck:
    - Security review, threat modelling, compliance analysis
    - Complex refactors touching core abstractions
    - Long-context document understanding (gemini-pro → 1M ctx)
    - Novel research synthesis

    ### TIER 4 — Frontier (opus · gpt5-pro)
    Maximum quality, maximum cost — reserve for critical decisions:
    - Mission-critical production changes (infra redesign, data migrations)
    - Final review pass on security-critical code
    - When the user says "best model" or "spare no expense"

    ---

    ## Self-Escalation Trigger Phrases

    | Signal                                                  | Action                       |
    |---------------------------------------------------------|------------------------------|
    | dolphin attempted task twice with no correct answer     | → flash or haiku             |
    | Conversation approaching 6k tokens                     | → flash (more context)       |
    | Task requires knowledge after July 2025                 | → flash (web grounding)      |
    | "I'm not confident about..."                            | Escalate one tier            |
    | Same bug attempted twice with no fix                    | → flash-think                |
    | Task requires deep understanding of unfamiliar codebase | → sonnet                     |
    | User says "think harder" / "you're missing something"   | Escalate one tier            |
    | Math / proof / formal verification required             | → o3-mini                    |
    | Prod deploy, data migration, security review            | → at least flash-think       |
    | Long document (>6k tokens) ingestion                   | → gemini-pro (1M ctx)        |
    | User says "best model" / "spare no expense"             | → opus or gpt5-pro           |
    | Cost is explicitly the constraint                       | → dolphin (free local)       |
    | Ollama unavailable / rate limited                       | → flash-lite or nano         |

    ---

    ## Budget-Aware Routing Profiles

    | Profile     | Models in rotation                                      | When to use              |
    |-------------|---------------------------------------------------------|--------------------------|
    | `local`     | dolphin                                                 | Free, always-on default  |
    | `budget`    | dolphin → flash-lite → nano → haiku                     | High-volume jobs, drafts |
    | `standard`  | dolphin → flash → mini → haiku                          | Default daily work       |
    | `reasoning` | flash-think → o3-mini                                   | Analysis / proofs        |
    | `premium`   | gemini-pro → sonnet → gpt5                              | Complex tasks            |
    | `frontier`  | opus → gpt5-pro                                         | Max quality only         |

    ---

    ## Session Model Switch (no bash needed)
    Use `/model <alias>` directly in chat.

    | Alias        | Model                                  | Tier      | ~Input cost/MTok | Context  |
    |--------------|----------------------------------------|-----------|------------------|----------|
    | `dolphin`    | ollama/dolphin3:8b-llama3.1-q4_K_M     | Local     | FREE             | 8k       |
    | `flash-lite` | google/gemini-2.5-flash-lite           | Reflex    | ~$0.10           | 1M       |
    | `nano`       | openai/gpt-5-nano                      | Reflex    | ~$0.05           | 128k     |
    | `flash`      | google/gemini-2.5-flash                | System 1  | ~$0.15           | 1M       |
    | `haiku`      | anthropic/claude-haiku-4-5             | System 1  | ~$1.00           | 200k     |
    | `mini`       | openai/gpt-5-mini                      | System 1  | ~$0.25           | 128k     |
    | `flash-think`| google/gemini-2.5-flash-thinking       | System 2  | ~$0.15 + think   | 1M       |
    | `o3-mini`    | openai/o3-mini                         | System 2  | reasoning-based  | 200k     |
    | `sonnet`     | anthropic/claude-sonnet-4-6            | Deep Work | ~$3.00           | 200k     |
    | `gpt5`       | openai/gpt-5.2                         | Deep Work | ~$1.75           | 128k     |
    | `gemini-pro` | google/gemini-3.1-pro-preview          | Deep Work | ~$2.00           | 1M       |
    | `opus`       | anthropic/claude-opus-4-6              | Frontier  | ~$5.00           | 200k     |
    | `gpt5-pro`   | openai/gpt-5.2-pro                     | Frontier  | ~$21.00          | 128k     |

    ---

    ## Change Global Default
    When user says "set default model to X":
    ```bash
    openclaw config set agents.defaults.model.primary <full-model-ref>
    ```
    Confirm:
    ```bash
    openclaw models status --plain
    ```
    Tell user to run `/new` to apply.

    ---

    ## Check Current Model & Usage
    ```bash
    openclaw models status
    ```

    ---

    ## Deprecation Notes (April 2026)
    - `google/gemini-2.0-flash` → **retiring June 1 2026** · migrate to `flash-lite` or `flash`
    - `openai/gpt-4o` / `gpt-4o-mini` → superseded by `gpt5` / `nano`
    - Always prefer non-preview aliases where latency and stability matter