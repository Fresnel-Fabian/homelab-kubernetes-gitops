apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: agentic-tools
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "bind": "all",
        "mode": "local",
        "auth": {
          "mode": "password"
        }
      },

      "env": {
        "ANTHROPIC_API_KEY": "${ANTHROPIC_API_KEY}",
        "OPENAI_API_KEY":    "${OPENAI_API_KEY}",
        "GEMINI_API_KEY":    "${GOOGLE_API_KEY}"
      },
      "tools": {
        "web": {
          "search": {
            "provider": "gemini",
            "gemini": {
              "model": "gemini-2.5-flash"
            }
          }
        }
      }

      "agents": {
        "defaults": {

          "model": {
            "primary": "google/gemini-2.5-flash-lite",

            "fallbacks": [
              "openai/gpt-5-nano",
              "anthropic/claude-haiku-4-5",
              "google/gemini-2.5-flash",
              "openai/gpt-5-mini"
            ]
          },

          "models": {

            "_comment_budget": "── BUDGET ── sub-$0.25/M input · rotate for all routine work",
            "google/gemini-2.5-flash-lite":         { "alias": "flash-lite",  "tier": "budget" },
            "google/gemini-3.1-flash-lite-preview":  { "alias": "flash3-lite", "tier": "budget" },
            "openai/gpt-5-nano":                     { "alias": "nano",        "tier": "budget" },

            "_comment_standard": "── STANDARD ── $0.25–$1/M input · go-to for most agentic loops",
            "google/gemini-2.5-flash":               { "alias": "flash",       "tier": "standard" },
            "google/gemini-3.1-flash-lite-preview":  { "alias": "flash3",      "tier": "standard" },
            "openai/gpt-5-mini":                     { "alias": "mini",        "tier": "standard" },
            "anthropic/claude-haiku-4-5":            { "alias": "haiku",       "tier": "standard" },

            "_comment_reasoning": "── REASONING ── thinking / chain-of-thought variants",
            "google/gemini-2.5-flash-thinking":      { "alias": "flash-think", "tier": "reasoning" },
            "openai/o3-mini":                        { "alias": "o3-mini",     "tier": "reasoning" },

            "_comment_premium": "── PREMIUM ── $1.75–$5/M input · complex tasks, high stakes",
            "openai/gpt-5.2":                        { "alias": "gpt5",        "tier": "premium" },
            "anthropic/claude-sonnet-4-6":           { "alias": "sonnet",      "tier": "premium" },
            "google/gemini-3.1-pro-preview":         { "alias": "gemini-pro",  "tier": "premium" },

            "_comment_frontier": "── FRONTIER ── $5+/M input · reserve for max-quality / deep work",
            "anthropic/claude-opus-4-6":             { "alias": "opus",        "tier": "frontier" },
            "openai/gpt-5.2-pro":                    { "alias": "gpt5-pro",    "tier": "frontier" }
          },

          "routing": {
            "budget":   ["google/gemini-2.5-flash-lite", "openai/gpt-5-nano", "anthropic/claude-haiku-4-5"],
            "standard": ["google/gemini-2.5-flash", "openai/gpt-5-mini", "anthropic/claude-haiku-4-5"],
            "reasoning":["google/gemini-2.5-flash-thinking", "openai/o3-mini"],
            "premium":  ["google/gemini-3.1-pro-preview", "anthropic/claude-sonnet-4-6", "openai/gpt-5.2"],
            "frontier": ["anthropic/claude-opus-4-6", "openai/gpt-5.2-pro"]
          },

          "sandbox": {
            "mode": "non-main"
          }
        }
      },

      "auth": {
        "cooldowns": {
          "billingBackoffHours": 5,
          "billingMaxHours":     24,
          "failureWindowHours":  24
        }
      },

      "channels": {
        "telegram": {
          "dmPolicy":          "pairing",
          "groupPolicy":       "open",
          "autoSelectFamily":  false,
          "dnsResultOrder":    "ipv4first"
        }
      }
    }
