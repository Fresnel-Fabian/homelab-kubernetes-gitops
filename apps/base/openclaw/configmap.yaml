apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: agentic-tools
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "bind": "lan",
        "mode": "local",
        "auth": {
          "mode": "password"
        },
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789",
            "http://127.0.0.1:18789",
            "http://192.168.0.244:18789"
          ]
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://llm-ollama.llm.svc.cluster.local:11434/v1",
            "api": "openai-completions",
            "models": [
              {
                "id": "ollama/qwen3:8b",
                "name": "qwen3:8b",
                "cost": { "input": 0, "output": 0 },
                "contextWindow": 128000,
                "maxTokens": 8000
              }
            ]
          }
        }
      },
      "tools": {
        "web": {
          "search": {
            "provider": "gemini",
            "gemini": {
              "model": "gemini-2.5-flash"
            },
            "cacheTtlMinutes": 30
          },
          "fetch": {
            "cacheTtlMinutes": 30
          }
        }
      },
      "agents": {
        "list": [
          {
            "id": "i_claw_bot",
            "default": true,
            "name": "i_claw_bot",
            "workspace": "~/.openclaw/workspace-i_claw_bot",
            "agentDir": "~/.openclaw/agents/i_claw_bot/agent",
            "model": "ollama/qwen3:8b"
          },
          {
            "id": "to_use_claw_bot",
            "name": "To_use_claw_bot",
            "workspace": "~/.openclaw/workspace-to_use_claw_bot",
            "agentDir": "~/.openclaw/agents/to_use_claw_bot/agent",
            "model": "ollama/qwen3:8b"
          },
          {
            "id": "tom_s_assistant_bot",
            "name": "tom_s_assistant_bot",
            "workspace": "~/.openclaw/workspace-tom_s_assistant_bot",
            "agentDir": "~/.openclaw/agents/tom_s_assistant_bot/agent",
            "model": "ollama/qwen3:8b"
          }
        ],
        "defaults": {
          "model": {
            "primary": "ollama/qwen3:8b",
            "fallbacks": [
              "google/gemini-2.5-flash-lite",
              "openai/gpt-5-nano",
              "anthropic/claude-haiku-4-5",
              "google/gemini-2.5-flash",
              "openai/gpt-5-mini"
              ]
          },
          "models": {
            "ollama/qwen3:8b":                       { "alias": "qwen3"       },
            "google/gemini-2.5-flash-lite":          { "alias": "flash-lite"  },
            "google/gemini-3.1-flash-lite-preview":  { "alias": "flash3-lite" },
            "openai/gpt-5-nano":                     { "alias": "nano"        },
            "google/gemini-2.5-flash":               { "alias": "flash"       },
            "openai/gpt-5-mini":                     { "alias": "mini"        },
            "anthropic/claude-haiku-4-5":            { "alias": "haiku"       },
            "google/gemini-2.5-flash-thinking":      { "alias": "flash-think" },
            "openai/o3-mini":                        { "alias": "o3-mini"     },
            "openai/gpt-5.2":                        { "alias": "gpt5"        },
            "anthropic/claude-sonnet-4-6":           { "alias": "sonnet"      },
            "google/gemini-3.1-pro-preview":         { "alias": "gemini-pro"  },
            "anthropic/claude-opus-4-6":             { "alias": "opus"        },
            "openai/gpt-5.2-pro":                    { "alias": "gpt5-pro"    }
          },
          "sandbox": {
            "mode": "off"
          },
          "contextPruning": {
            "mode": "cache-ttl",
            "ttl": "2h"
          },
          "compaction": {
            "mode": "safeguard"
          },
          "session": {
            "historyLimit": 100,
            "dmHistoryLimit": 50
          },
          "heartbeat": {
            "every": "30m"
          }
        }
      },
      "bindings": [
        {
          "agentId": "i_claw_bot",
          "match": { "channel": "telegram", "accountId": "i_claw_bot" }
        },
        {
          "agentId": "to_use_claw_bot",
          "match": { "channel": "telegram", "accountId": "to_use_claw_bot" }
        },
        {
          "agentId": "tom_s_assistant_bot",
          "match": { "channel": "telegram", "accountId": "tom_s_assistant_bot" }
        }
      ],
      "auth": {
        "cooldowns": {
          "billingBackoffHours": 5,
          "billingMaxHours":     24,
          "failureWindowHours":  24
        }
      },
      "channels": {
        "telegram": {
          "streaming": "partial",
          "textChunkLimit": 4096,
          "chunkMode": "newline",
          "dmPolicy": "pairing",
          "groupPolicy": "open",
          "network": {
            "autoSelectFamily": false,
            "dnsResultOrder":   "ipv4first"
          },
          "accounts": {
            "i_claw_bot": {
              "botToken": "${TELEGRAM_I_CLAW_BOT_TOKEN}",
              "groupPolicy": "open"
            },
            "to_use_claw_bot": {
              "botToken": "${TELEGRAM_TO_USE_CLAW_BOT_TOKEN}",
              "groupPolicy": "open"
            },
            "tom_s_assistant_bot": {
              "botToken": "${TELEGRAM_TOM_S_ASSISTANT_BOT_TOKEN}",
              "groupPolicy": "open"
            }
          }
        }
      }
    }
