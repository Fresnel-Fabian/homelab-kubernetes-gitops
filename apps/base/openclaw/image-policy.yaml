apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: openclaw
  namespace: flux-system
spec:
  image: ghcr.io/openclaw/openclaw
  interval: 12h                   # scan for new tags every 12h
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: openclaw
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: openclaw
  policy:
    semver:
      range: ">=2026.0.0"
