# apps/base/openclaw/image-update-automation.yaml
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: openclaw
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-bot
        email: flux@homelab
      messageTemplate: "chore(openclaw): automated image update"
    push:
      branch: main
  update:
    strategy: Setters
    path: ./apps/base/openclaw