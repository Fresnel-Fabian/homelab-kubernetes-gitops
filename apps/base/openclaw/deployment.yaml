# apps/base/openclaw/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: agentic-tools
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: copy-skills
        image: busybox
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw
          cp -L /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json
          mkdir -p /home/node/.openclaw/workspace/skills/model-manager
          cp -L /etc/openclaw/skills/SKILL.md /home/node/.openclaw/workspace/skills/model-manager/SKILL.md
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: skills
          mountPath: /etc/openclaw/skills
        - name: workspace
          mountPath: /home/node/.openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        ports:
        - name: gateway
          containerPort: 18789
        env:
        - name: NODE_OPTIONS
          value: "--max-old-space-size=1024"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: openai-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gemini-api-key
        - name: OPENCLAW_GATEWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gateway-password
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 768Mi
          limits:
            cpu: 1000m
            memory: 1.5Gi
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: workspace
          mountPath: /home/node/.openclaw
        livenessProbe:
          exec:
            command: ["sh", "-c", "curl -sf http://127.0.0.1:18789/ || exit 1"]
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["sh", "-c", "curl -sf http://127.0.0.1:18789/ || exit 1"]
          initialDelaySeconds: 45
          periodSeconds: 15
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: openclaw-config
      - name: workspace
        persistentVolumeClaim:
          claimName: openclaw-workspace
      - name: skills
        configMap:
          name: openclaw-skills
