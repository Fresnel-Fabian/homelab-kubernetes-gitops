apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: agentic-tools
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: copy-skills
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -e

          mkdir -p /home/node/.openclaw
          chmod 700 /home/node/.openclaw

          cp -L /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json

          mkdir -p /home/node/.openclaw/workspace-i_claw_bot/skills/model-manager
          mkdir -p /home/node/.openclaw/workspace-to_use_claw_bot/skills/model-manager
          mkdir -p /home/node/.openclaw/workspace-tom_s_assistant_bot/skills/model-manager

          cp -L /etc/openclaw/skills/SKILL.md /home/node/.openclaw/workspace-i_claw_bot/skills/model-manager/SKILL.md
          cp -L /etc/openclaw/skills/SKILL.md /home/node/.openclaw/workspace-to_use_claw_bot/skills/model-manager/SKILL.md
          cp -L /etc/openclaw/skills/SKILL.md /home/node/.openclaw/workspace-tom_s_assistant_bot/skills/model-manager/SKILL.md

          chown -R 1000:1000 /home/node/.openclaw
          chmod -R u+rwX,go-rwx /home/node/.openclaw

          echo "Done"
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: skills
          mountPath: /etc/openclaw/skills
        - name: workspace
          mountPath: /home/node/.openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.3.28 # {"$imagepolicy": "flux-system:openclaw"}
        ports:
        - name: gateway
          containerPort: 18789
        env:
        - name: NODE_OPTIONS
          value: "--max-old-space-size=2048 --max-semi-space-size=64"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: openai-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gemini-api-key
        - name: OPENCLAW_GATEWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gateway-password
        - name: TELEGRAM_I_CLAW_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-i-claw-bot
        - name: TELEGRAM_TO_USE_CLAW_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-To_use_claw_bot
        - name: TELEGRAM_TOM_S_ASSISTANT_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-tom_s_assistant_bot
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            cpu: 2000m
            memory: 3Gi
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: workspace
          mountPath: /home/node/.openclaw
        startupProbe:
          httpGet:
            path: /
            port: gateway
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /
            port: gateway
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /
            port: gateway
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 2
      volumes:
      - name: config
        configMap:
          name: openclaw-config
      - name: workspace
        persistentVolumeClaim:
          claimName: openclaw-workspace
      - name: skills
        configMap:
          name: openclaw-skills
      terminationGracePeriodSeconds: 30