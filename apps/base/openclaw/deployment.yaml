# apps/base/openclaw/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: agentic-tools
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: copy-skills
        image: alpine:3.18
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        command:
        - sh
        - -c
        - |
          set -ex
          mkdir -p /home/node/.openclaw
          chown -R 1000:1000 /home/node/.openclaw
          chmod 700 /home/node/.openclaw
          cp -L /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json
          for agent in workspace-i_claw_bot workspace-to_use_claw_bot workspace-tom_s_assistant_bot; do
            mkdir -p /home/node/.openclaw/$agent/skills/model-manager
            cp -L /etc/openclaw/skills/SKILL.md \
                  /home/node/.openclaw/$agent/skills/model-manager/SKILL.md
          done
          echo "Done"
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: skills
          mountPath: /etc/openclaw/skills
        - name: workspace
          mountPath: /home/node/.openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.3.28 # {"$imagepolicy": "flux-system:openclaw"}
        ports:
        - name: gateway
          containerPort: 18789
        env:
        - name: NODE_OPTIONS
          value: "--max-old-space-size=2048 --max-semi-space-size=64"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: openai-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gemini-api-key
        - name: OPENCLAW_GATEWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: gateway-password
        - name: TELEGRAM_I_CLAW_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-i-claw-bot
        - name: TELEGRAM_TO_USE_CLAW_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-To_use_claw_bot
        - name: TELEGRAM_TOM_S_ASSISTANT_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: telegram-bot-token-tom_s_assistant_bot
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 500m
            memory: 1.5Gi
          limits:
            cpu: 2000m
            memory: 3Gi
        volumeMounts:
        - name: config
          mountPath: /etc/openclaw/openclaw.json
          subPath: openclaw.json
        - name: workspace
          mountPath: /home/node/.openclaw
        startupProbe:
          exec:
            command: ["sh", "-c", "curl -sf http://127.0.0.1:18789/ || exit 1"]
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["sh", "-c", "curl -sf http://127.0.0.1:18789/ || exit 1"]
          initialDelaySeconds: 45
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 10
        livenessProbe:
          exec:
            command: ["sh", "-c", "curl -sf http://127.0.0.1:18789/ || exit 1"]
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 10
      volumes:
      - name: config
        configMap:
          name: openclaw-config
      - name: workspace
        persistentVolumeClaim:
          claimName: openclaw-workspace
      - name: skills
        configMap:
          name: openclaw-skills
      terminationGracePeriodSeconds: 30