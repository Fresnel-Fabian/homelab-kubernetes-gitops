apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: 20ee9b9e-d3b7-40bf-91a0-9a6279d0cb2a
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    protocol: auto
    grace-period: 30s
    no-autoupdate: true
    loglevel: info
    retries: 5
    originRequest:
      connectTimeout: 10s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      noHappyEyeballs: false
      noTLSVerify: false
    ingress:
      # Grafana
      - hostname: grafana.fresnelfabian.com
        service: http://grafana.logging.svc.cluster.local:80
      # n8n
      - hostname: n8n.fresnelfabian.com
        service: http://agentic-tools-n8n.agentic-tools.svc.cluster.local:5678
      # Woodpecker
      - hostname: ci.fresnelfabian.com
        service: http://ci-cd-woodpecker-server.ci-cd.svc.cluster.local:80
        originRequest:
          disableChunkedEncoding: true
      - hostname: orangebike.fresnelfabian.com
        service: http://orangebike.staging.svc.cluster.local:80
      # Catch-all — required, must be last
      - service: http_status:404
